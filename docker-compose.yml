services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - seedflower

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE}
    command: ["node", "./dist/src/backend/db/migrate.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DIR: ${STORAGE_DIR}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      REMINDER_SCAN_INTERVAL_MS: ${REMINDER_SCAN_INTERVAL_MS}
      REMINDER_LOOKAHEAD_MINUTES: ${REMINDER_LOOKAHEAD_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - seedflower

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE}
    command: ["node", "./dist/src/backend/server.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DIR: ${STORAGE_DIR}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      REMINDER_SCAN_INTERVAL_MS: ${REMINDER_SCAN_INTERVAL_MS}
      REMINDER_LOOKAHEAD_MINUTES: ${REMINDER_LOOKAHEAD_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - storage_data:${STORAGE_DIR}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.BACKEND_PORT || 3045) + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - seedflower

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE}
    command: ["node", "./dist/src/backend/worker.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_DIR: ${STORAGE_DIR}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      REMINDER_SCAN_INTERVAL_MS: ${REMINDER_SCAN_INTERVAL_MS}
      REMINDER_LOOKAHEAD_MINUTES: ${REMINDER_LOOKAHEAD_MINUTES}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - storage_data:${STORAGE_DIR}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('fs'); const cmd=fs.readFileSync('/proc/1/cmdline', 'utf8'); process.exit(cmd.includes('worker.js') ? 0 : 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - seedflower

  proxy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS}
      BACKEND_PORT: ${BACKEND_PORT}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seedflower

networks:
  seedflower:
    driver: bridge

volumes:
  postgres_data:
  storage_data:
  caddy_data:
  caddy_config:
